<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Состав косметики</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header__icon">🧴</div>
    <h1 class="header__title">Состав косметики</h1>
    <p class="header__sub">Анализатор безопасности ингредиентов</p>
  </header>

  <main>

    <!-- Input -->
    <section class="input-section">
      <label class="input-label" for="ingredients-input">Состав продукта</label>
      <div class="textarea-wrap">
        <textarea
          id="ingredients-input"
          placeholder="Вставьте состав косметики — каждый ингредиент через запятую или с новой строки:

Aqua, Glycerin, Sodium Laureth Sulfate, Cocamidopropyl Betaine, Methylparaben, Parfum, Citric Acid..."
        ></textarea>
      </div>
      <p class="hint-text">Ctrl+Enter — быстрый анализ</p>

      <div class="btn-row">
        <button id="analyze-btn" class="btn btn--primary">🔍 Анализировать</button>
        <button id="clear-btn" class="btn btn--secondary" title="Очистить">✕</button>
      </div>
    </section>

    <!-- Results -->
    <section id="results" class="results-section" hidden>

      <h2 class="results-title">Результаты анализа</h2>

      <!-- Overall safety -->
      <span id="safety-badge" class="safety-badge"></span>

      <!-- Counts -->
      <div id="stats" class="stats"></div>

      <!-- Per-ingredient cards -->
      <div id="ingredients-list" class="ingredients-list"></div>

    </section>

  </main>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
